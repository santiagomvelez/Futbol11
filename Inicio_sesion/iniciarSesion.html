<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Core - Iniciar Sesión</title>
    <link rel="stylesheet" href="../Css/style-perfil.css">
    <link rel="stylesheet" href="../Css/style-login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="img/Logo/logo-favicon.png" type="image/x-icon">
</head>

<body class="fondo-principal texto-blanco caja-flexible flex-columna alinear-centro justificar-centro"
    style="min-height: 100vh;">

    <!-- Botón Volver -->
    <a href="../index.html" class="enlace-volver">&#8592; Inicio</a>

    <main class="contenedor relleno-20 caja-flexible justificar-centro alinear-centro">

        <div class="fondo-oscuro radio-grande sombra borde-sup-azulado contenedor-formulario">

            <div class="texto-centrado margen-abajo-20 relleno-abajo-10 borde-inf-azulado">
                <h1 class="texto-muy-grande texto-esmeralda">Iniciar Sesión</h1>
                <p class="texto-secundario texto-chico">Ingresá tus datos para continuar</p>
            </div>

            <form action="#" method="POST" class="caja-flexible flex-columna">

                <div>
                    <label for="identifier" class="label-formulario">Mail o Nombre de usuario:</label>
                    <input type="text" id="identifier" name="identifier" class="input-formulario" required>
                </div>

                <div>
                    <label for="password" class="label-formulario">Contraseña:</label>
                    <input type="password" id="password" name="password" class="input-formulario" required>
                </div>

                <button type="submit" class="boton boton-esmeralda ancho-100 margen-arriba-10">Ingresar</button>

            </form>

            <p class="texto-centrado texto-chico margen-arriba-10">
                <span class="texto-secundario">¿No tenés cuenta?</span>
                <a href="../Crear_cuenta/crearCuenta.html" class="texto-esmeralda">Registrate</a>
            </p>

        </div>

    </main>

</body>

</html>
